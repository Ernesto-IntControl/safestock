version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: safestock-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: safestock
      MYSQL_USER: safestock
      MYSQL_PASSWORD: safestock123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - safestock-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safestock-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "mysql://safestock:safestock123@mysql:3306/safestock"
      JWT_SECRET: "your_jwt_secret_key"
      PORT: 5000
    depends_on:
      - mysql
    networks:
      - safestock-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safestock-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: "http://localhost:5000/api"
    depends_on:
      - backend
    networks:
      - safestock-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  safestock-network:
    driver: bridge